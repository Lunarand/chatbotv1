name: Build Offline APK
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Fix/Initialize Project Structure
        run: |
          # This command creates the missing android/ folder and Gradle files
          # It uses your existing pubspec.yaml to keep the app name and package
          flutter create --platforms=android .

      - name: Inject AI Model
        run: |
          mkdir -p assets/models
          wget -q -O assets/models/tinyllama.gguf https://huggingface.co/TheBloke/TinyLlama-1.1B-Chat-v1.0-GGUF/resolve/main/tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf

      - name: Build Android APK
        run: |
          flutter pub get
          # We use --no-tree-shake-icons to avoid common font build errors
          flutter build apk --release --no-tree-shake-icons

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Poco-F5-Uncensored-AI
          path: build/app/outputs/flutter-apk/app-release.apk
