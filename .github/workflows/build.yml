name: Build Offline APK
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Fix Project Structure and Expand RAM Limits
        run: |
          # 1. Generate the Android folders and Gradle files
          flutter create --platforms=android .
          
          # 2. THE FIX: Inject largeHeap="true" into the Android Manifest
          # This prevents the "2-second crash" by allowing high RAM usage
          sed -i 's/<application/<application android:largeHeap="true"/g' android/app/src/main/AndroidManifest.xml

      - name: Inject AI Model
        run: |
          mkdir -p assets/models
          wget -q -O assets/models/tinyllama.gguf https://huggingface.co/TheBloke/TinyLlama-1.1B-Chat-v1.0-GGUF/resolve/main/tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf

      - name: Build Android APK
        run: |
          flutter pub get
          # Using --no-tree-shake-icons to prevent build-time font errors
          flutter build apk --release --no-tree-shake-icons

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Poco-F5-Uncensored-AI
          path: build/app/outputs/flutter-apk/app-release.apk
